<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #131a2e;
    --card-hover: #1a2540;
    --border: #1e2d50;
    --green: #2ecc71;
    --blue: #3b82f6;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #a855f7;
    --text: #e8ecf4;
    --text-dim: #7a8ba8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
  }
  .container { max-width: 1100px; margin: 0 auto; }

  .header {
    text-align: center;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 28px;
    background: linear-gradient(135deg, #2ecc71, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .label { font-size: 11px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .change { font-size: 12px; margin-top: 4px; }
  .stat-card .change.up { color: var(--green); }
  .stat-card .change.down { color: var(--red); }

  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 700px) { .chart-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .chart-card h3 {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .chart-card canvas { width: 100% !important; height: 250px !important; }

  .log-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
  }
  .log-section h3 {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .log-table { width: 100%; border-collapse: collapse; }
  .log-table th {
    text-align: left;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .log-table td {
    font-size: 13px;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(30,45,80,0.4);
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: var(--card-hover); }

  .exercise-tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-right: 4px;
    background: rgba(59,130,246,0.12);
    color: var(--blue);
  }
  .exercise-tag.t2 { background: rgba(46,204,113,0.12); color: var(--green); }
  .exercise-tag.t3 { background: rgba(245,158,11,0.12); color: var(--orange); }
  .exercise-tag.t4 { background: rgba(168,85,247,0.12); color: var(--purple); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏋️ Workout Tracker</h1>
    <div class="subtitle">Progressive overload · Full body 3x/week</div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="chart-grid">
    <div class="chart-card">
      <h3>📈 Weight Progression</h3>
      <canvas id="weightChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>📊 Volume Per Session</h3>
      <canvas id="volumeChart"></canvas>
    </div>
  </div>

  <div class="log-section">
    <h3>📋 Workout Log</h3>
    <table class="log-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Exercises</th>
          <th>Total Volume</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<script>
const COLORS = ['#3b82f6', '#2ecc71', '#f59e0b', '#a855f7'];
const EXERCISE_ORDER = ['DB Press', 'Leg Press', 'Lat Pulldown', 'RDL'];

fetch('data/workouts.json')
  .then(r => r.json())
  .then(data => {
    const workouts = data.workouts;
    renderStats(workouts);
    renderWeightChart(workouts);
    renderVolumeChart(workouts);
    renderLog(workouts);
  });

function renderStats(workouts) {
  const last = workouts[workouts.length - 1];
  const prev = workouts.length > 1 ? workouts[workouts.length - 2] : null;
  const totalWorkouts = workouts.length;
  const totalVolume = workouts.reduce((s, w) => s + w.exercises.reduce((ss, e) => ss + e.volume, 0), 0);

  const exCount = last.exercises.length;
  let changes = '';
  if (prev) {
    const prevVol = prev.exercises.reduce((s, e) => s + e.volume, 0);
    const curVol = last.exercises.reduce((s, e) => s + e.volume, 0);
    const diff = ((curVol - prevVol) / prevVol * 100).toFixed(1);
    changes = `<div class="change ${diff >= 0 ? 'up' : 'down'}">${diff >= 0 ? '▲' : '▼'} ${Math.abs(diff)}% vs last session</div>`;
  }

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="value">${totalWorkouts}</div>
      <div class="label">Workouts</div>
    </div>
    <div class="stat-card">
      <div class="value">${(totalVolume / 1000).toFixed(1)}k</div>
      <div class="label">Total Volume (kg)</div>
      ${changes}
    </div>
    <div class="stat-card">
      <div class="value">${exCount}</div>
      <div class="label">Exercises / Session</div>
    </div>
    <div class="stat-card">
      <div class="value">${Math.round(totalVolume / totalWorkouts).toLocaleString()}</div>
      <div class="label">Avg Volume / Session</div>
    </div>
  `;
}

function renderWeightChart(workouts) {
  const labels = workouts.map(w => w.date.slice(-5));
  const datasets = [];

  EXERCISE_ORDER.forEach((exName, i) => {
    const data = workouts.map(w => {
      const ex = w.exercises.find(e => e.name === exName);
      return ex ? ex.weight : null;
    });
    datasets.push({
      label: exName,
      data,
      borderColor: COLORS[i],
      backgroundColor: COLORS[i] + '20',
      fill: false,
      tension: 0.3,
      pointRadius: 5,
      pointHoverRadius: 7,
      spanGaps: false
    });
  });

  new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#7a8ba8', font: { size: 12 } } }
      },
      scales: {
        x: { ticks: { color: '#7a8ba8' }, grid: { color: 'rgba(30,45,80,0.3)' } },
        y: {
          ticks: { color: '#7a8ba8' },
          grid: { color: 'rgba(30,45,80,0.3)' },
          title: { display: true, text: 'Weight (kg)', color: '#7a8ba8' }
        }
      }
    }
  });
}

function renderVolumeChart(workouts) {
  const labels = workouts.map(w => w.date.slice(-5));
  const exercises = {};

  workouts.forEach(w => {
    w.exercises.forEach(e => {
      if (!exercises[e.name]) exercises[e.name] = [];
    });
  });

  EXERCISE_ORDER.forEach((exName, i) => {
    const data = workouts.map(w => {
      const ex = w.exercises.find(e => e.name === exName);
      return ex ? ex.volume : 0;
    });
    if (data.some(d => d > 0)) {
      const chart = new Chart(document.getElementById('volumeChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: datasets.length ? null : [{}]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
      chart.destroy();
    }
  });

  const datasets = EXERCISE_ORDER.map((exName, i) => {
    const data = workouts.map(w => {
      const ex = w.exercises.find(e => e.name === exName);
      return ex ? ex.volume : 0;
    });
    return {
      label: exName,
      data,
      backgroundColor: COLORS[i] + '80',
      borderColor: COLORS[i],
      borderWidth: 1,
      borderRadius: 3
    };
  });

  new Chart(document.getElementById('volumeChart'), {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#7a8ba8', font: { size: 12 } } }
      },
      scales: {
        x: {
          stacked: true,
          ticks: { color: '#7a8ba8' },
          grid: { color: 'rgba(30,45,80,0.3)' }
        },
        y: {
          stacked: true,
          ticks: { color: '#7a8ba8' },
          grid: { color: 'rgba(30,45,80,0.3)' },
          title: { display: true, text: 'Volume (kg)', color: '#7a8ba8' }
        }
      }
    }
  });
}

function renderLog(workouts) {
  const tbody = document.getElementById('logBody');
  const tagColors = ['t1','t2','t3','t4'];

  tbody.innerHTML = [...workouts].reverse().map(w => {
    const totalVol = w.exercises.reduce((s, e) => s + e.volume, 0);
    const exHtml = w.exercises.map((e, i) => {
      const tagClass = tagColors[i % tagColors.length];
      const setStr = e.sets.join(', ');
      return `<span class="exercise-tag ${tagClass}">${e.name}: ${e.weight}kg × [${setStr}]</span>`;
    }).join(' ');
    return `<tr>
      <td style="white-space:nowrap;font-weight:600">${w.date}</td>
      <td>${exHtml}</td>
      <td>${Math.round(totalVol).toLocaleString()} kg</td>
      <td style="color:var(--text-dim);font-size:12px">${w.notes || ''}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
